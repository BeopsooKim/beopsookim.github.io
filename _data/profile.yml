short_bio: >-
  <p>
    I am a Ph.D. candidate in the Department of Electrical and Computer Engineering at
    <a href="https://eng.inha.ac.kr/eng/index.do" target="_blank">Inha University</a>, advised by
    <a href="https://sites.google.com/view/inhapower/members/professor" target="_blank">Prof. Insu Kim</a>.
    I completed the doctoral defense and final review process in June-July 2026,
    and the degree is expected to be conferred in August 2026.
    My doctoral research develops a sequential procedure that carries the converged AC-DC operating point
    from power-flow analysis into fault and harmonic studies for converter-interfaced hybrid grids.
  </p>
  <p>
    My broader work includes microgrids and distributed energy resources, protection and fault analysis,
    energy-storage and virtual-power-plant operation, and AI and optimization methods for grid resilience.
    I implement these studies with MATLAB, Python, and PLC-based measurement and control systems in the
    <a href="https://sites.google.com/view/inhapower/home" target="_blank">Intelligent Power Grid Lab</a>.
  </p>

